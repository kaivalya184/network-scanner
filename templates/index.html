<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Network Scanner | Kaivalya Ingole</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Courier New',monospace;background:#0a0a0f;color:#e0e0e0;min-height:100vh;padding:2rem;}
    h1{font-size:1.1rem;color:#58a6ff;letter-spacing:2px;margin-bottom:.25rem;}
    .subtitle{font-size:.75rem;color:#555;margin-bottom:1.75rem;}
    .info-bar{display:flex;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .info-card{background:#12121a;border:1px solid #1e1e2e;border-radius:8px;padding:10px 16px;font-size:12px;}
    .info-label{color:#555;margin-bottom:2px;}
    .info-val{color:#58a6ff;font-weight:bold;}
    .scan-btn{padding:12px 28px;background:#1a2a1a;border:1px solid #2a6641;border-radius:8px;
      color:#7ee787;font-family:'Courier New',monospace;font-size:14px;cursor:pointer;letter-spacing:1px;
      transition:all .2s;margin-bottom:1.5rem;}
    .scan-btn:hover{background:#2a3a2a;}
    .scan-btn:disabled{opacity:.5;cursor:not-allowed;}
    .status-bar{font-size:12px;color:#555;margin-bottom:1rem;min-height:18px;}
    .pulse{animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:10px 12px;border-bottom:1px solid #1e1e2e;color:#555;font-size:11px;letter-spacing:1.5px;}
    td{padding:10px 12px;border-bottom:1px solid #12121a;}
    tr:hover td{background:#12121a;}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px;}
    .badge-ssh{background:#0d2218;color:#7ee787;border:1px solid #2a6641;}
    .badge-http{background:#0d1a2a;color:#58a6ff;border:1px solid #2a4a6a;}
    .badge-rdp{background:#2a1a0d;color:#f0883e;border:1px solid #6a4a2a;}
    .badge-smb{background:#2a0d0d;color:#ff7b7b;border:1px solid #6a2a2a;}
    .badge-other{background:#1a1a26;color:#888;border:1px solid #2a2a3e;}
    .online{color:#7ee787;}
    .empty{color:#333;font-size:13px;padding:2rem;text-align:center;}
    footer{text-align:center;font-size:11px;color:#333;margin-top:2rem;}
    footer a{color:#58a6ff;text-decoration:none;}
  </style>
</head>
<body>
  <h1>🌐 NETWORK SCANNER</h1>
  <p class="subtitle">Local Network Device Discovery — by Kaivalya Ingole</p>

  <div class="info-bar">
    <div class="info-card"><div class="info-label">Your IP</div><div class="info-val" id="localIp">detecting...</div></div>
    <div class="info-card"><div class="info-label">Devices Found</div><div class="info-val" id="devCount">0</div></div>
    <div class="info-card"><div class="info-label">Scan Range</div><div class="info-val" id="scanRange">—</div></div>
  </div>

  <button class="scan-btn" id="scanBtn" onclick="startScan()">▶ START SCAN</button>
  <div class="status-bar" id="statusBar">Ready to scan your local network.</div>

  <table>
    <thead>
      <tr>
  <th>#</th>
  <th>IP ADDRESS</th>
  <th>MAC ADDRESS</th>
  <th>HOSTNAME</th>
  <th>DEVICE TYPE</th>
  <th>STATUS</th>
  <th>OPEN SERVICES</th>
</tr>
    </thead>
    <tbody id="resultsBody">
      <tr><td colspan="8" class="empty">No scan results yet. Click START SCAN.</td></tr>
    </tbody>
  </table>

  <footer>Built by <a href="https://github.com/KaivalyaIngole">Kaivalya Ingole</a></footer>

<script>
const badgeClass = {SSH:'badge-ssh',HTTP:'badge-http','HTTP-Alt':'badge-http',HTTPS:'badge-http',RDP:'badge-rdp',SMB:'badge-smb'};
let polling = null;

async function startScan(){
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('statusBar').innerHTML = '<span class="pulse">⚡ Scanning network... This may take 30–60 seconds.</span>';
  document.getElementById('resultsBody').innerHTML = '<tr><td colspan="8" class="empty">Scanning...</td></tr>';
  await fetch('/start-scan',{method:'POST'});
  polling = setInterval(fetchResults, 2000);
}

async function fetchResults(){

  const res = await fetch('/results');

  const data = await res.json();

  document.getElementById(
    'localIp'
  ).textContent =
    data.local_ip || '—';

  document.getElementById(
    'scanRange'
  ).textContent =
    data.network_range || '—';

  document.getElementById(
    'devCount'
  ).textContent =
    data.device_count || 0;

  if(data.results.length > 0){

    renderTable(data.results);

  }

  if(data.ipv6_addresses){

    document.getElementById(
      'ipv6List'
    ).innerHTML =

      data.ipv6_addresses.length

      ? data.ipv6_addresses.join('<br>')

      : 'No IPv6 detected';
  }

  if(data.status.done){

    clearInterval(polling);

    document.getElementById(
      'statusBar'
    ).textContent =

      `✅ Scan complete — ${data.results.length} device(s) found.`;

    document.getElementById(
      'scanBtn'
    ).disabled = false;
  }
}
function renderTable(results){

  const tbody = document.getElementById(
    'resultsBody'
  );

  tbody.innerHTML = results.map((d,i)=>{

    const badges = d.services.length

      ? d.services.map(s=>

          `<span class="badge ${
            badgeClass[s] || 'badge-other'
          }">${s}</span>`

        ).join('')

      : '<span style="color:#333">None</span>';

    return `
      <tr>

        <td style="color:#555">
          ${i+1}
        </td>

        <td style="
          color:#58a6ff;
          font-weight:bold
        ">
          ${d.ip}
        </td>

        <td style="
          color:#f0883e;
          font-size:12px
        ">
          ${d.mac || 'Unknown'}
        </td>

        <td>
          ${d.hostname}
        </td>

        <td style="
          color:#7ee787
        ">
          ${d.device_type || 'Unknown'}
        </td>

        <td class="online">
          ● ${d.status}
        </td>

        <td>
          ${badges}
        </td>

      </tr>
    `;

  }).join('');
}

fetch('/results').then(r=>r.json()).then(d=>{
  if(d.local_ip) document.getElementById('localIp').textContent = d.local_ip;
  document.getElementById('scanRange').textContent = (d.local_ip||'').split('.').slice(0,3).join('.')+'.0/24';
});
</script>
</body>
</html>
